<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Payino y el Papi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          gblue: { DEFAULT: '#1a73e8', dark: '#1557b0', light: '#e8f0fe' },
          gred: '#d93025',
          ggreen: '#188038',
          gyellow: '#f9ab00',
          surface: '#ffffff',
          bg: '#f1f3f4',
          onsurface: '#202124',
          onsurfaceVariant: '#5f6368',
          outline: '#dadce0'
        },
        fontFamily: {
          sans: ['Roboto', 'Arial', 'sans-serif']
        }
      }
    }
  }
</script>
<style>
  body { font-family: 'Roboto', Arial, sans-serif; }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
    line-height: 1;
    font-size: 20px;
  }

  .elevation-1 { box-shadow: 0 1px 2px 0 rgba(60,64,67,.30), 0 1px 3px 1px rgba(60,64,67,.15); }
  .elevation-2 { box-shadow: 0 1px 2px 0 rgba(60,64,67,.30), 0 2px 6px 2px rgba(60,64,67,.15); }
  .elevation-3 { box-shadow: 0 4px 8px 3px rgba(60,64,67,.15), 0 1px 3px rgba(60,64,67,.30); }
  .hover-elevation-2:hover { box-shadow: 0 1px 2px 0 rgba(60,64,67,.30), 0 2px 6px 2px rgba(60,64,67,.15); }

  .face-zoom { transform: scale(1.9); transform-origin: 50% 22%; }

  .chevron { transition: transform .2s cubic-bezier(.4,0,.2,1); }
  .chevron.open { transform: rotate(180deg); }

  @keyframes dialogIn {
    from { opacity: 0; transform: scale(.92); }
    to { opacity: 1; transform: scale(1); }
  }
  .dialog-in { animation: dialogIn .22s cubic-bezier(.4,0,.2,1) forwards; }

  @keyframes imgIn {
    from { opacity: 0; transform: scale(.6); }
    to { opacity: 1; transform: scale(1); }
  }
  .img-in { animation: imgIn .3s cubic-bezier(.34,1.56,.64,1) forwards; }

  @keyframes fadeOutOverlay { to { opacity: 0; } }
  .fade-out { animation: fadeOutOverlay .18s ease-in forwards; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 8px; }
</style>
</head>
<body class="min-h-screen bg-bg text-onsurface">

  <div class="max-w-xl mx-auto px-4 py-10 sm:py-14">

    <!-- header -->
    <header class="mb-2">
      <div class="flex items-center gap-3">
        <div class="flex -space-x-1 shrink-0">
          <span class="w-3 h-3 rounded-full bg-gblue block"></span>
          <span class="w-3 h-3 rounded-full bg-gred block"></span>
          <span class="w-3 h-3 rounded-full bg-gyellow block"></span>
          <span class="w-3 h-3 rounded-full bg-ggreen block"></span>
        </div>
        <h1 class="text-2xl sm:text-3xl font-medium text-onsurface">El Payino y el Papi</h1>
      </div>
    </header>

    <!-- switcher: choose who you are via URL -->
    <section id="switcher" class="bg-surface rounded-2xl elevation-1 p-8 text-center">
      <h2 class="text-lg font-medium text-onsurface mb-1">¿Quién eres?</h2>
      <p class="text-onsurfaceVariant text-sm mb-6">Elige tu usuario para entrar directo, sin preguntas cada vez</p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="?user=angel" class="flex-1 flex items-center gap-3 border border-outline rounded-xl px-4 py-3 hover:bg-bg hover:border-gblue transition">
          <div class="w-10 h-10 rounded-full overflow-hidden bg-gblue-light flex items-center justify-center shrink-0">
            <img src="assets/angel.png" alt="Angel" class="w-full h-full object-cover face-zoom" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
            <span class="hidden items-center justify-center w-full h-full material-symbols-outlined text-onsurfaceVariant">person</span>
          </div>
          <span class="font-medium text-onsurface">Soy Angel</span>
        </a>
        <a href="?user=nelson" class="flex-1 flex items-center gap-3 border border-outline rounded-xl px-4 py-3 hover:bg-bg hover:border-gblue transition">
          <div class="w-10 h-10 rounded-full overflow-hidden bg-gblue-light flex items-center justify-center shrink-0">
            <img src="assets/nelson.png" alt="Nelson" class="w-full h-full object-cover face-zoom" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
            <span class="hidden items-center justify-center w-full h-full material-symbols-outlined text-onsurfaceVariant">person</span>
          </div>
          <span class="font-medium text-onsurface">Soy Nelson</span>
        </a>
      </div>
    </section>

    <!-- main app: shown once a valid user is chosen via URL -->
    <div id="app" class="hidden">

      <!-- hero image of the current user + balance badge, top right -->
      <div class="mb-6">
        <div class="flex justify-end">
          <div id="heroWrap" class="relative">
            <button id="heroBtn" class="block w-40 h-40 sm:w-48 sm:h-48">
              <img id="heroImg" src="" alt="" class="w-full h-full object-contain">
              <div id="heroFallback" class="hidden w-full h-full items-center justify-center material-symbols-outlined text-onsurfaceVariant" style="font-size:96px">person</div>
            </button>
            <div id="userMenuDropdown" class="hidden absolute right-0 top-full bg-surface rounded-lg elevation-2 py-1 w-52 z-30 text-left">
              <a href="index.html" class="flex items-center gap-3 px-4 py-2.5 text-sm text-onsurface hover:bg-bg transition">
                <span class="material-symbols-outlined text-onsurfaceVariant" style="font-size:20px">swap_horiz</span>
                Cambiar de usuario
              </a>
            </div>
          </div>
        </div>
        <div class="flex justify-end -mt-4">
          <div id="balanceBadge" class="bg-surface elevation-1 rounded-full pl-4 pr-1.5 py-1.5 flex items-center gap-3">
            <span id="balanceDot" class="w-2 h-2 rounded-full bg-ggreen shrink-0"></span>
            <p id="balanceText" class="text-sm font-medium text-onsurface whitespace-nowrap">Cargando...</p>
            <button id="settleBtn" class="hidden items-center gap-1.5 bg-gblue hover:bg-gblue-dark text-white text-xs font-medium px-3 py-1.5 rounded-full transition">
              <span class="material-symbols-outlined" style="font-size:16px">handshake</span>
              Liquidar deuda
            </button>
          </div>
        </div>
      </div>

      <!-- add expense form -->
      <section class="bg-surface rounded-2xl elevation-1 p-5 mb-4">
        <h2 class="flex items-center gap-2 text-base font-medium text-onsurface mb-4">
          <span class="material-symbols-outlined text-gblue">add_circle</span>
          Agregar un gasto
        </h2>
        <form id="expenseForm" class="space-y-3">
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-onsurfaceVariant" style="font-size:20px">receipt_long</span>
            <input id="description" type="text" placeholder="¿En qué gastaste?" maxlength="80" required
                   class="w-full rounded-lg border border-outline pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:border-gblue focus:ring-2 focus:ring-gblue-light">
          </div>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-onsurfaceVariant" style="font-size:20px">euro</span>
            <input id="amount" type="number" step="0.01" min="0.01" placeholder="Monto" required
                   class="w-full rounded-lg border border-outline pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:border-gblue focus:ring-2 focus:ring-gblue-light">
          </div>
          <button id="submitBtn" type="submit" class="w-full flex items-center justify-center gap-2 bg-gblue hover:bg-gblue-dark text-white font-medium text-sm py-2.5 rounded-lg elevation-1 hover-elevation-2 transition">
            <span class="material-symbols-outlined" style="font-size:20px">payments</span>
            <span id="submitBtnText">Agregar gasto</span>
          </button>
        </form>
      </section>

      <!-- history: small unobtrusive link, keeps dropdown behavior -->
      <div class="px-1">
        <button id="historyToggle" class="inline-flex items-center gap-1.5 text-sm font-medium text-gblue hover:bg-gblue-light rounded-md px-2 py-1 -ml-2 transition">
          <span class="material-symbols-outlined" style="font-size:18px">history</span>
          Historial
          <span id="historyChevron" class="material-symbols-outlined chevron" style="font-size:18px">expand_more</span>
        </button>
        <ul id="historyList" class="hidden mt-3 divide-y divide-outline/60 bg-surface rounded-lg elevation-1 max-h-96 overflow-y-auto"></ul>
        <p id="emptyState" class="hidden text-center text-onsurfaceVariant text-sm py-6">Aún no hay gastos registrados. ¡Agrega el primero!</p>
      </div>
    </div>
  </div>

  <!-- payment animation: material dialog with the payer's image -->
  <div id="overlay" class="fixed inset-0 z-50 hidden items-center justify-center bg-[rgba(32,33,36,.6)]" onclick="hideOverlay()">
    <div id="overlayCard" class="dialog-in bg-surface rounded-2xl elevation-3 p-8 text-center max-w-xs mx-4">
      <div id="overlayAvatarWrap" class="img-in w-32 h-32 mx-auto flex items-center justify-center">
        <img id="overlayImg" src="" alt="" class="w-full h-full object-contain">
        <div id="overlayFallback" class="w-full h-full hidden items-center justify-center material-symbols-outlined text-onsurfaceVariant" style="font-size:64px">person</div>
      </div>
      <h3 id="overlayTitle" class="text-base font-medium text-onsurface mt-4"></h3>
      <p id="overlaySubtitle" class="text-sm text-onsurfaceVariant mt-1"></p>
    </div>
  </div>

<script>
  const STORAGE_KEY = 'elPayinoYElPapi_records';

  const USERS = {
    Angel:  { name: 'Angel',  img: 'assets/angel.png',  title: 'Angel pagó' },
    Nelson: { name: 'Nelson', img: 'assets/nelson.png', title: 'Nelson pagó' }
  };

  function setAvatarImage(imgEl, fallbackEl, who) {
    imgEl.style.display = '';
    fallbackEl.style.display = 'none';
    imgEl.src = USERS[who].img;
    imgEl.onerror = () => {
      imgEl.style.display = 'none';
      fallbackEl.style.display = 'flex';
    };
  }

  // resolve current user strictly from the URL, e.g. index.html?user=angel
  const urlParams = new URLSearchParams(location.search);
  let rawUser = (urlParams.get('user') || '').toLowerCase();
  let currentUser = rawUser === 'angel' ? 'Angel' : rawUser === 'nelson' ? 'Nelson' : null;

  let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }

  function fmt(n) {
    return n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function computeBalance() {
    return records.reduce((sum, r) => sum + r.contribution, 0);
  }

  function render() {
    const balance = computeBalance();
    const balanceText = document.getElementById('balanceText');
    const balanceDot = document.getElementById('balanceDot');
    const settleBtn = document.getElementById('settleBtn');

    if (Math.abs(balance) < 0.005) {
      balanceText.textContent = 'Están en paz';
      balanceDot.className = 'w-2 h-2 rounded-full bg-ggreen shrink-0';
      settleBtn.classList.add('hidden');
      settleBtn.classList.remove('flex');
    } else if (balance > 0) {
      balanceText.textContent = `Nelson le debe ${fmt(balance)} € a Angel`;
      balanceDot.className = 'w-2 h-2 rounded-full bg-gyellow shrink-0';
      settleBtn.classList.remove('hidden');
      settleBtn.classList.add('flex');
    } else {
      balanceText.textContent = `Angel le debe ${fmt(-balance)} € a Nelson`;
      balanceDot.className = 'w-2 h-2 rounded-full bg-gyellow shrink-0';
      settleBtn.classList.remove('hidden');
      settleBtn.classList.add('flex');
    }

    const list = document.getElementById('historyList');
    const emptyState = document.getElementById('emptyState');
    const historyExpanded = !list.classList.contains('hidden');
    list.innerHTML = '';

    if (records.length === 0) {
      if (historyExpanded) emptyState.classList.remove('hidden');
    } else {
      emptyState.classList.add('hidden');
      [...records].reverse().forEach(r => {
        const li = document.createElement('li');
        li.className = 'flex items-center gap-3 px-4 py-3 hover:bg-bg transition';
        const dateStr = new Date(r.date).toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });

        if (r.type === 'settlement') {
          li.innerHTML = `
            <div class="w-8 h-8 rounded-full bg-ggreen/10 flex items-center justify-center shrink-0">
              <span class="material-symbols-outlined text-ggreen" style="font-size:18px">handshake</span>
            </div>
            <div class="min-w-0 flex-1">
              <p class="text-sm font-medium text-onsurface truncate">${r.description}</p>
              <p class="text-xs text-onsurfaceVariant">${dateStr}</p>
            </div>
            <span class="text-sm font-medium text-ggreen shrink-0">${fmt(r.amount)} €</span>
            <button class="material-symbols-outlined text-onsurfaceVariant hover:text-gred transition shrink-0" style="font-size:20px" onclick="deleteRecord('${r.id}')">delete</button>`;
        } else {
          li.innerHTML = `
            <div class="w-8 h-8 rounded-full overflow-hidden bg-gblue-light flex items-center justify-center shrink-0">
              <img src="${USERS[r.paidBy].img}" alt="${r.paidBy}" class="w-full h-full object-cover face-zoom" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
              <span class="hidden items-center justify-center w-full h-full material-symbols-outlined text-onsurfaceVariant" style="font-size:16px">person</span>
            </div>
            <div class="min-w-0 flex-1">
              <p class="text-sm font-medium text-onsurface truncate">${r.description}</p>
              <p class="text-xs text-onsurfaceVariant">${r.paidBy} · ${dateStr}</p>
            </div>
            <span class="text-sm font-medium text-onsurface shrink-0">${fmt(r.amount)} €</span>
            <button class="material-symbols-outlined text-onsurfaceVariant hover:text-gred transition shrink-0" style="font-size:20px" onclick="deleteRecord('${r.id}')">delete</button>`;
        }
        list.appendChild(li);
      });
    }
  }

  function deleteRecord(id) {
    records = records.filter(r => r.id !== id);
    save();
    render();
  }

  function initApp() {
    document.getElementById('switcher').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');

    setAvatarImage(document.getElementById('heroImg'), document.getElementById('heroFallback'), currentUser);
    document.getElementById('submitBtnText').textContent = `Agregar gasto de ${currentUser}`;

    document.getElementById('heroBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('userMenuDropdown').classList.toggle('hidden');
    });
    document.addEventListener('click', (e) => {
      if (!document.getElementById('heroWrap').contains(e.target)) {
        document.getElementById('userMenuDropdown').classList.add('hidden');
      }
    });

    document.getElementById('historyToggle').addEventListener('click', () => {
      const list = document.getElementById('historyList');
      const chevron = document.getElementById('historyChevron');
      const emptyState = document.getElementById('emptyState');
      const willOpen = list.classList.contains('hidden');
      list.classList.toggle('hidden');
      chevron.classList.toggle('open');
      if (willOpen && records.length === 0) emptyState.classList.remove('hidden');
      else emptyState.classList.add('hidden');
    });

    document.getElementById('expenseForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const description = document.getElementById('description').value.trim();
      const amount = parseFloat(document.getElementById('amount').value);

      if (!description || !amount || amount <= 0) return;

      // the person who paid is owed the full amount by the other person (no 50/50 split)
      const contribution = currentUser === 'Angel' ? amount : -amount;

      records.push({
        id: crypto.randomUUID(),
        type: 'expense',
        description,
        amount,
        paidBy: currentUser,
        contribution,
        date: new Date().toISOString()
      });

      save();
      render();
      showPaymentAnimation(currentUser, amount, description);

      e.target.reset();
      document.getElementById('description').focus();
    });

    document.getElementById('settleBtn').addEventListener('click', () => {
      const balance = computeBalance();
      if (Math.abs(balance) < 0.005) return;

      const debtor = balance > 0 ? 'Nelson' : 'Angel';
      const creditor = debtor === 'Nelson' ? 'Angel' : 'Nelson';
      const amount = Math.abs(balance);

      records.push({
        id: crypto.randomUUID(),
        type: 'settlement',
        description: `Liquidación: ${debtor} le pagó a ${creditor}`,
        amount,
        paidBy: debtor,
        contribution: -balance,
        date: new Date().toISOString()
      });

      save();
      render();
      showPaymentAnimation(debtor, amount, 'Liquidación de la deuda');
    });

    render();
  }

  let hideTimeout = null;

  function showPaymentAnimation(who, amount, description) {
    const user = USERS[who];
    const overlay = document.getElementById('overlay');
    const overlayCard = document.getElementById('overlayCard');
    const overlayAvatarWrap = document.getElementById('overlayAvatarWrap');
    const overlayImg = document.getElementById('overlayImg');
    const overlayFallback = document.getElementById('overlayFallback');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlaySubtitle = document.getElementById('overlaySubtitle');

    setAvatarImage(overlayImg, overlayFallback, who);

    overlayAvatarWrap.classList.remove('img-in');
    void overlayAvatarWrap.offsetWidth;
    overlayAvatarWrap.classList.add('img-in');

    overlayCard.classList.remove('dialog-in');
    void overlayCard.offsetWidth;
    overlayCard.classList.add('dialog-in');

    overlayTitle.textContent = `${user.title} ${fmt(amount)} €`;
    overlaySubtitle.textContent = description;

    overlay.classList.remove('hidden', 'fade-out');
    overlay.classList.add('flex');

    if (hideTimeout) clearTimeout(hideTimeout);
    hideTimeout = setTimeout(hideOverlay, 2000);
  }

  function hideOverlay() {
    const overlay = document.getElementById('overlay');
    overlay.classList.add('fade-out');
    setTimeout(() => {
      overlay.classList.add('hidden');
      overlay.classList.remove('flex', 'fade-out');
    }, 200);
  }

  if (currentUser) {
    initApp();
  }
</script>
</body>
</html>
