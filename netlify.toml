[build]
  publish = "."
  command = "sed -i \"s/__GEMINI_API_KEY__/${GEMINI_API_KEY//\\//\\\\/}/\" index.html"

[build.environment]
  # This key is meant to end up in the shipped index.html (client-side call,
  # no backend) — tell Netlify's secret scanner not to flag it as a leak.
  SECRETS_SCAN_OMIT_KEYS = "GEMINI_API_KEY"
